<div class="viewer-container">
  <model-viewer
    src="https://raw.githubusercontent.com/adrianhajdin/project_threejs_ai/main/client/public/shirt_baked.glb"
    alt="3D Clothing Model"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="30deg"
    min-camera-orbit="auto 90deg auto"
    max-camera-orbit="auto 90deg auto"
    shadow-intensity="1"
    camera-orbit="0deg 90deg 105%"
    field-of-view="30deg"
    interaction-prompt="auto"
    loading="eager">

    <!-- Loading Progress Indicator -->
    <div slot="progress-bar" class="progress-bar-container">
      <div class="progress-bar">
        <div class="progress-bar-inner"></div>
      </div>
      <p class="loading-text">Loading 3D Model...</p>
    </div>

    <!-- Poster/Placeholder while loading -->
    <div slot="poster" class="poster">
      <div class="spinner"></div>
    </div>
  </model-viewer>
</div>
