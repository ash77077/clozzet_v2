<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <div class="icon-wrapper">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h2>Set Your Password</h2>
      <p>This is your first login. Please set a new password to continue.</p>
    </div>

    <form class="reset-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="password-input">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            id="newPassword"
            name="newPassword"
            [(ngModel)]="newPassword"
            required
            minlength="8"
            class="form-control"
            placeholder="Minimum 8 characters">
          <button type="button" class="password-toggle" (click)="toggleNewPassword()">
            <svg *ngIf="!showNewPassword" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showNewPassword" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar" *ngIf="newPassword.length > 0">
          <div class="strength-fill"
            [class.weak]="newPassword.length < 8"
            [class.strong]="newPassword.length >= 8">
          </div>
          <span class="strength-label" [class.weak]="newPassword.length < 8" [class.strong]="newPassword.length >= 8">
            {{ newPassword.length < 8 ? 'Too short' : 'Good' }}
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-input">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            class="form-control"
            [class.mismatch]="confirmPassword.length > 0 && !passwordsMatch"
            placeholder="Repeat your new password">
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
            <svg *ngIf="!showConfirmPassword" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showConfirmPassword" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>
            </svg>
          </button>
        </div>
        <p class="mismatch-hint" *ngIf="confirmPassword.length > 0 && !passwordsMatch">Passwords do not match</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary submit-btn"
        [disabled]="!isFormValid || isLoading">
        <span *ngIf="isLoading" class="loading-spinner"></span>
        <svg *ngIf="!isLoading" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 13l4 4L19 7"/>
        </svg>
        {{ isLoading ? 'Saving...' : 'Set Password & Continue' }}
      </button>
    </form>
  </div>

  <div class="reset-background">
    <div class="bg-pattern"></div>
  </div>
</div>
